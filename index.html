<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Dream Duas — Visionaire App</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Nastaliq+Urdu:wght@400;600;700&display=swap">
  <style>
    /* ─── RESET & VARIABLES ─── */
    :root {
      --p:    #1a5f4a;
      --pd:   #0d3d2e;
      --a:    #c9a227;
      --al:   #fff8e1;
      --bg:   #f4faf7;
      --card: #ffffff;
      --txt:  #1a202c;
      --muted:#64748b;
      --bdr:  #e2e8f0;
      --r:    14px;
      --sh:   0 2px 16px rgba(0,0,0,.08);
    }
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{height:100%;overflow:hidden}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
         background:var(--bg);color:var(--txt);line-height:1.65;font-size:16px}

    /* ─── APP SHELL ─── */
    #app{height:100vh;height:100dvh;display:flex;flex-direction:column;overflow:hidden}

    /* header */
    #hdr{display:none;padding:max(10px, env(safe-area-inset-top, 10px)) 18px 6px;background:var(--card);
         border-bottom:1px solid var(--bdr);flex-shrink:0}
    #hdr.on{display:flex;align-items:center;gap:10px}
    #hdr-label{font-size:12px;color:var(--muted);white-space:nowrap;min-width:70px}
    #hdr-track{flex:1;height:6px;background:var(--bdr);border-radius:3px;overflow:hidden}
    #hdr-fill{height:100%;background:var(--p);border-radius:3px;transition:width .35s ease}

    /* main */
    #main{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:18px 16px 24px}

    /* footer */
    #ftr{display:none;padding:10px 16px max(18px, env(safe-area-inset-bottom, 18px));
         background:var(--card);border-top:1px solid var(--bdr);gap:10px;flex-shrink:0}
    #ftr.on{display:flex}

    /* ─── BUTTONS ─── */
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;
         padding:13px 22px;border-radius:var(--r);border:none;cursor:pointer;
         font-size:15px;font-weight:600;transition:all .18s;text-align:center}
    .btn-p{background:var(--p);color:#fff;flex:1}
    .btn-p:active{background:var(--pd)}
    .btn-g{background:#f1f5f9;color:var(--muted);border:1px solid var(--bdr)}
    .btn-g:active{background:var(--bdr)}
    .btn-sm{padding:9px 14px;font-size:13px}
    .btn-full{width:100%}
    .btn-outline{background:transparent;border:1.5px solid var(--p);color:var(--p)}

    /* ─── VERSION SELECT ─── */
    .sel-wrap{max-width:600px;margin:0 auto;padding-bottom:32px}
    .sel-top{text-align:center;padding:28px 0 22px}
    .sel-top .bismi{font-size:21px;color:var(--p);display:block;margin-bottom:6px}
    .sel-top h1{font-size:24px;font-weight:800;margin-bottom:4px}
    .sel-top p{color:var(--muted);font-size:14px}
    .ver-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
    .ver-card:last-child:nth-child(odd){grid-column:1 / -1}
    .ver-card{background:var(--card);border-radius:var(--r);padding:18px 14px;text-align:center;
              cursor:pointer;border:2px solid var(--bdr);transition:all .18s;position:relative}
    .ver-card:hover,.ver-card:active{border-color:var(--p);transform:translateY(-2px);box-shadow:var(--sh)}
    .ver-card .vc-em{font-size:30px;display:block;margin-bottom:8px}
    .ver-card .vc-lb{font-size:14px;font-weight:700;display:block}
    .ver-card .vc-sub{font-size:11px;color:var(--muted);display:block;margin-top:2px}
    .vc-badge{position:absolute;top:8px;right:8px;background:var(--p);color:#fff;
              font-size:9px;padding:2px 7px;border-radius:20px;font-weight:700}
    .sel-credit{text-align:center;font-size:11px;color:var(--muted);
                padding-top:14px;border-top:1px solid var(--bdr)}
    .sel-credit strong{color:var(--p)}

    /* ─── WELCOME ─── */
    .wel-wrap{max-width:520px;margin:0 auto;padding-top:16px}
    .wel-icon{font-size:44px;text-align:center;display:block;margin-bottom:12px}
    .wel-wrap h2{font-size:21px;font-weight:800;color:var(--p);margin-bottom:6px}
    .wel-wrap .wel-body{color:var(--muted);font-size:14px;margin-bottom:20px;line-height:1.7}
    .field{margin-bottom:14px}
    .field label{display:block;font-size:12px;font-weight:700;text-transform:uppercase;
                 letter-spacing:.4px;color:var(--muted);margin-bottom:5px}
    .field input{width:100%;padding:12px 14px;border:1.5px solid var(--bdr);
                 border-radius:var(--r);font-size:15px;outline:none;background:var(--card);color:var(--txt)}
    .field input:focus{border-color:var(--p)}
    .voice-sel{width:100%;padding:12px 14px;border:1.5px solid var(--bdr);
               border-radius:var(--r);font-size:14px;outline:none;background:var(--card);
               color:var(--txt);-webkit-appearance:none;appearance:none;cursor:pointer}
    .voice-sel:focus{border-color:var(--p)}
    .return-box{background:var(--al);border:1.5px solid var(--a);border-radius:var(--r);
                padding:14px 16px;margin-bottom:18px}
    .return-box p{font-size:13px;margin-bottom:10px;color:var(--txt)}
    .return-box .rb-row{display:flex;gap:8px}

    /* ─── FOUNDATION ─── */
    .fnd-wrap{max-width:560px;margin:0 auto}
    .fnd-wrap h2{font-size:20px;font-weight:800;color:var(--p);margin-bottom:4px}
    .fnd-intro{color:var(--muted);font-size:14px;margin-bottom:18px}
    .teach-card{background:var(--card);border-radius:var(--r);padding:16px 18px;
                margin-bottom:12px;border-left:4px solid var(--p);box-shadow:var(--sh)}
    .teach-card h3{font-size:14px;font-weight:700;color:var(--p);margin-bottom:5px}
    .teach-card p{font-size:14px;color:var(--txt);line-height:1.65}
    .teach-card .hadith{font-style:italic;font-size:13px;color:var(--muted);
                        margin-top:8px;padding-top:8px;border-top:1px solid var(--bdr)}
    /* kids teach cards */
    .teach-card.fun{border-left-color:var(--a);background:#fffdf0}
    .teach-card.fun h3{color:#b8860b}

    /* ─── CATEGORY ─── */
    .cat-wrap{max-width:560px;margin:0 auto}
    .cat-hdr{display:flex;align-items:flex-start;gap:12px;margin-bottom:14px}
    .cat-em{font-size:36px;flex-shrink:0}
    .cat-hdr-text h2{font-size:19px;font-weight:800;color:var(--p);line-height:1.2}
    .cat-hdr-text .cat-num{font-size:12px;color:var(--muted);margin-top:2px}
    .cat-intro{font-size:14px;color:var(--muted);margin-bottom:16px;line-height:1.65}
    .reflect-box{background:var(--al);border-radius:var(--r);padding:14px 16px;margin-bottom:16px}
    .reflect-box h4{font-size:11px;font-weight:700;text-transform:uppercase;
                    letter-spacing:.5px;color:var(--p);margin-bottom:8px}
    .reflect-box ul{list-style:none;padding:0}
    .reflect-box li{font-size:13px;color:var(--txt);padding:4px 0 4px 18px;position:relative}
    .reflect-box li::before{content:'→';position:absolute;left:0;color:var(--p);font-weight:700}
    .sample-toggle{width:100%;text-align:left;background:transparent;
                   border:1.5px dashed var(--bdr);border-radius:var(--r);
                   padding:10px 14px;font-size:13px;color:var(--muted);cursor:pointer;
                   margin-bottom:12px;transition:all .15s}
    .sample-toggle:hover{border-color:var(--p);color:var(--p)}
    .sample-box{background:#f8fffe;border:1.5px solid var(--p);border-radius:var(--r);
                padding:14px 16px;margin-bottom:14px;display:none}
    .sample-box.open{display:block}
    .sample-box strong{display:block;font-size:10px;text-transform:uppercase;
                       letter-spacing:.5px;color:var(--p);margin-bottom:7px}
    .sample-box p{font-size:13px;color:var(--muted);font-style:italic;line-height:1.7}
    .ta-label{font-size:13px;font-weight:700;color:var(--txt);margin-bottom:7px;display:block}
    .dua-ta{width:100%;min-height:160px;padding:14px;border:1.5px solid var(--bdr);
            border-radius:var(--r);font-size:15px;font-family:inherit;color:var(--txt);
            background:var(--card);resize:none;outline:none;line-height:1.7;
            transition:border-color .18s}
    .dua-ta:focus{border-color:var(--p)}
    .dua-ta::placeholder{color:#b0bec5}
    .char-ct{text-align:right;font-size:11px;color:var(--muted);margin-top:4px}

    /* ─── SUMMARY ─── */
    .sum-wrap{max-width:560px;margin:0 auto;padding-bottom:32px}
    .sum-top{text-align:center;padding:14px 0 22px}
    .sum-top .sum-icon{font-size:46px;display:block;margin-bottom:10px}
    .sum-top h2{font-size:21px;font-weight:800;color:var(--p);margin-bottom:4px}
    .sum-top p{font-size:14px;color:var(--muted)}
    .sum-card{background:var(--card);border-radius:var(--r);padding:16px 18px;
              margin-bottom:12px;border:1.5px solid var(--bdr);box-shadow:var(--sh)}
    .sum-card h3{font-size:13px;font-weight:700;color:var(--p);margin-bottom:8px;
                 display:flex;align-items:center;gap:8px}
    .sum-card p{font-size:14px;color:var(--txt);line-height:1.7;white-space:pre-wrap}
    .sum-card .empty{font-style:italic;color:var(--muted);font-size:13px}
    .lq-box{background:var(--p);color:#fff;border-radius:var(--r);
            padding:20px 18px;text-align:center;margin:20px 0}
    .lq-box .lq-ar{font-size:21px;direction:rtl;display:block;margin-bottom:8px}
    .lq-box .lq-tr{font-style:italic;font-size:13px;opacity:.9;margin-bottom:5px}
    .lq-box .lq-en{font-size:13px;opacity:.85}
    .lq-box .lq-ref{font-size:11px;opacity:.7;margin-top:8px;display:block}
    .sum-actions{display:flex;gap:10px;flex-wrap:wrap;margin:16px 0}
    .sum-footer{text-align:center;font-size:12px;color:var(--muted);
                padding:14px 0 24px;border-top:1px solid var(--bdr);margin-top:16px}
    .sum-footer strong{color:var(--p)}
    .res-box{background:var(--card);border:1.5px solid var(--p);border-radius:var(--r);
             padding:16px 18px;margin:16px 0}
    .res-box h4{font-size:13px;font-weight:700;color:var(--p);margin-bottom:4px}
    .res-box p{font-size:13px;color:var(--muted);margin-bottom:12px}
    .res-links{display:flex;gap:10px;flex-wrap:wrap}
    .res-link{display:inline-flex;align-items:center;gap:6px;padding:10px 16px;
              background:var(--p);color:#fff;border-radius:var(--r);text-decoration:none;
              font-size:13px;font-weight:600;transition:opacity .15s}
    .res-link:hover{opacity:.85}
    .res-link-secondary{background:transparent;border:1.5px solid var(--p);color:var(--p)}

    /* ─── MENTORS ─── */
    .mentor-box{background:var(--card);border:1.5px solid var(--p);border-radius:var(--r);
                padding:12px 16px;margin-bottom:14px}
    .mentor-box h4{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;
                   color:var(--p);margin-bottom:8px}
    .mentor-box ul{list-style:none;padding:0}
    .mentor-box li{font-size:13px;color:var(--txt);padding:3px 0 3px 16px;position:relative;line-height:1.5}
    .mentor-box li::before{content:'→';position:absolute;left:0;color:var(--p);font-weight:700}

    /* ─── AYAT & HADITH per category ─── */
    .cat-ayat{background:var(--al);border-left:4px solid var(--a);border-radius:0 var(--r) var(--r) 0;
              padding:11px 14px;margin-bottom:12px}
    .cat-ayat-ar{font-size:17px;direction:rtl;display:block;text-align:right;
                 margin-bottom:6px;color:var(--txt);font-style:normal}
    .cat-ayat-tr{font-size:13px;color:var(--txt);font-style:italic;display:block;margin-bottom:4px}
    .cat-hadith{background:#f8fffe;border-left:4px solid var(--p);border-radius:0 var(--r) var(--r) 0;
                padding:11px 14px;margin-bottom:12px}
    .cat-hadith-tx{font-size:13px;color:var(--txt);font-style:italic;display:block;margin-bottom:4px}
    .cat-ref{font-size:11px;color:var(--muted);display:block}

    /* ─── CRITERIA STRIP ─── */
    .criteria-strip{padding:10px 14px;background:var(--al);border:1.5px solid var(--a);
                    border-radius:12px;margin:18px 0 6px}
    .cs-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
    .cs-lbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;
            color:var(--p);white-space:nowrap}
    .cs-pill{font-size:11px;padding:3px 9px;background:var(--card);border:1.5px solid var(--a);
             border-radius:20px;color:var(--p);cursor:pointer;transition:all .15s;white-space:nowrap}
    .cs-pill:hover,.cs-pill.cp-on{background:var(--p);color:#fff;border-color:var(--p)}
    .cs-hint{font-size:12px;color:var(--p);margin-top:6px;padding:6px 8px;
             background:var(--card);border-radius:8px;border-left:3px solid var(--p);
             display:none;line-height:1.5}
    .cs-hint.show{display:block}

    /* ─── HELP PANEL ─── */
    .ta-label-row{display:flex;align-items:center;flex-wrap:wrap;gap:6px;margin-top:4px}
    .help-btn{display:inline-flex;align-items:center;gap:4px;font-size:12px;font-weight:600;
              padding:4px 11px;background:transparent;border:1.5px solid var(--p);
              border-radius:20px;color:var(--p);cursor:pointer;transition:all .15s}
    .help-btn:hover{background:var(--p);color:#fff}
    .help-panel{background:var(--bg);border:1.5px dashed var(--a);border-radius:14px;
                padding:14px 16px;margin-bottom:10px;font-size:13px}
    .hp-tag{display:inline-block;font-size:10px;font-weight:700;text-transform:uppercase;
            letter-spacing:.4px;border-radius:20px;padding:2px 9px;margin-bottom:5px}
    .hp-bad .hp-tag{background:#fde8e8;color:#c0392b}
    .hp-good .hp-tag{background:#e8f8ee;color:#1b6b1b}
    .hp-text{font-size:13px;line-height:1.7;margin:0 0 10px;color:var(--txt)}
    .hp-arrow{text-align:center;font-size:12px;font-weight:700;color:var(--p);
              padding:4px 0;letter-spacing:.3px}
    .hp-notes{margin-top:10px;padding-top:10px;border-top:1px solid var(--bdr)}
    .hp-notes-lbl{font-size:11px;font-weight:700;text-transform:uppercase;color:var(--muted);
                  letter-spacing:.4px;margin-bottom:5px;display:block}
    .hp-notes ul{margin:0;padding-left:16px;font-size:12px;color:var(--p);line-height:1.9}

    /* ─── URDU / RTL LAYOUT ─── */
    .rtl-wrap{direction:rtl;text-align:right;font-family:'Noto Nastaliq Urdu','Jameel Noori Nastaleeq','Segoe UI',sans-serif;line-height:2}
    .rtl-wrap .bismi,.rtl-wrap h1,.rtl-wrap h2,.rtl-wrap h3,.rtl-wrap h4,.rtl-wrap p,.rtl-wrap label,
    .rtl-wrap .tts-btn,.rtl-wrap .btn{font-family:inherit}
    .rtl-wrap .hadith,.rtl-wrap .cat-hadith .hadith-tx,.rtl-wrap .cat-ref{text-align:right;direction:rtl}
    .rtl-wrap .tts-btn{flex-direction:row-reverse}

    /* ─── TEXT TO SPEECH ─── */
    .tts-btn{display:inline-flex;align-items:center;gap:5px;padding:5px 13px;
             background:transparent;border:1.5px solid var(--p);border-radius:20px;
             color:var(--p);font-size:12px;font-weight:600;cursor:pointer;margin-top:7px;
             transition:background .15s,color .15s;white-space:nowrap;text-transform:none;
             letter-spacing:normal;flex-shrink:0}
    .tts-btn:hover,.tts-btn:active{background:var(--p);color:#fff}
    .tts-btn.tts-active{background:var(--p);color:#fff}
    .tts-sm{padding:3px 10px;font-size:11px;margin-top:3px}
    .mentor-box h4{display:flex;align-items:center;gap:8px;flex-wrap:wrap}

    /* ─── VOICE NOTE ─── */
    .voice-section{margin:0 0 14px 0}
    .voice-rec-btn{width:100%;display:flex;align-items:center;gap:10px;padding:11px 16px;
                   background:var(--card);border:1.5px dashed var(--bdr);border-radius:var(--r);
                   cursor:pointer;font-size:13px;color:var(--muted);transition:all .18s;text-align:left}
    .voice-rec-btn:hover,.voice-rec-btn:active{border-color:var(--p);color:var(--p);background:#f8fffe}
    .voice-rec-btn .mic-ic{font-size:20px;flex-shrink:0}
    .voice-recording{display:flex;align-items:center;gap:12px;padding:11px 16px;
                     background:#fff5f5;border:1.5px solid #e53e3e;border-radius:var(--r)}
    .rec-dot{width:12px;height:12px;background:#e53e3e;border-radius:50%;flex-shrink:0;
             animation:pulse-rec 1s infinite}
    @keyframes pulse-rec{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.85)}}
    .rec-timer{font-size:13px;font-weight:700;color:#e53e3e;font-variant-numeric:tabular-nums;flex-shrink:0}
    .rec-label{font-size:13px;color:#c53030;flex:1}
    .stop-btn{padding:7px 14px;background:#e53e3e;color:#fff;border:none;border-radius:10px;
              font-size:12px;font-weight:700;cursor:pointer;flex-shrink:0}
    .voice-player-box{background:var(--card);border:1.5px solid var(--p);border-radius:var(--r);
                      padding:10px 14px}
    .voice-player-box .vp-label{font-size:11px;font-weight:700;text-transform:uppercase;
                                 letter-spacing:.5px;color:var(--p);margin-bottom:8px;display:block}
    .voice-player-box audio{width:100%;height:36px;outline:none;display:block}
    .vp-actions{display:flex;gap:8px;margin-top:8px}
    .vp-btn{font-size:12px;padding:6px 12px;border-radius:8px;border:none;cursor:pointer;font-weight:600}
    .vp-btn-del{background:#fff5f5;color:#e53e3e;border:1px solid #fed7d7}
    .vp-btn-rec{background:#f0fdf4;color:var(--p);border:1px solid var(--p)}

    /* ─── FADE TRANSITION ─── */
    #main{opacity:1;transition:opacity .15s}
    #main.fade{opacity:0}

    /* ─── PRINT ─── */
    @media print{
      body{overflow:auto;background:#fff;font-size:11pt}
      #app{overflow:visible;height:auto}
      #hdr,#ftr,.sum-actions,.btn{display:none!important}
      #main{overflow:visible;padding:0}
      .sum-wrap{max-width:100%}
      .sum-card{break-inside:avoid;border:1px solid #ddd;box-shadow:none}
      .sum-top .sum-icon{display:none}
    }

    /* ─── MISC ─── */
    .ayah-pull{background:var(--al);border-left:4px solid var(--a);border-radius:0 var(--r) var(--r) 0;
               padding:.9rem 1rem;font-style:italic;font-size:13px;margin:10px 0;color:var(--txt)}
    .ayah-pull .ref{display:block;margin-top:4px;font-size:11px;color:var(--muted);font-style:normal}
    .warn-box{background:#fff8f0;border:1.5px solid #fb8c00;border-radius:var(--r);
              padding:14px 16px;margin:12px 0;font-size:13px}
    .warn-box strong{color:#e65100;display:block;margin-bottom:4px}
  </style>
</head>
<body>
<div id="app">
  <header id="hdr">
    <span id="hdr-label"></span>
    <div id="hdr-track"><div id="hdr-fill"></div></div>
  </header>
  <main id="main"></main>
  <footer id="ftr"></footer>
</div>

<script>
// ════════════════════════════════════════════════
// CONTENT DATA
// ════════════════════════════════════════════════

const FOUNDATION = {
  kids: [
    { em:'🔑', title:'What is a Dream Dua?',
      body:'A dream dua is not just a wish — it\'s a super-powered dua that gives you BUTTERFLIES! 🦋 It\'s something specific (not just "be smart" but "Ya Allah let me memorize 3 juz by next Ramadan!"), it\'s slightly scary AND exciting, and it\'s something you dream of for your future.' },
    { em:'🌈', title:'Ask Even When Things Are GOOD!',
      body:'Most people only remember to ask Allah when something bad happens — like a storm at sea. That\'s called a Reactive Dua. But the REAL superpower is asking Allah when life is fine too — that\'s a Proactive Dua. Dream duas are proactive. You\'re planning your amazing future with Allah\'s help!' },
    { em:'🎬', title:'IMAGINE It First!',
      body:'Shaykh Muhammad al-Shareef waited 10 years for children. His dua was becoming boring — just words with no feeling. Then he tried something: he IMAGINED first. He pictured his daughter\'s wedding day, his sons leading salah. He saw it so clearly it felt real. Then he made dua — and it was answered! Close your eyes before each dua and picture it answered. Then ask.' },
    { em:'🌟', title:'Your Dua GROWS You!',
      body:'Here is the COOLEST thing: when you make a dream dua every day, you don\'t just wait for it — you EVOLVE toward it! Like how Pikachu trains every day and eventually becomes stronger — you gradually become the person who deserves the answered dua. Your dua doesn\'t change to fit you. YOU grow to match your dua!',
      hadith:'"Allah answers every dua except the one who gives up and says it wasn\'t answered." — Bukhari & Muslim. Never give up! 🤲' }
  ],
  teens: [
    { em:'🔑', title:'What is a Dream Dua?',
      body:'A dream dua is specific, vivid, and slightly unrealistic — it gives you butterflies because it\'s connected to your deepest hopes. Not vague ("be healthy") but concrete ("Ya Allah let me run a 5K by next year with a body that serves my salah"). It spans 3–6 years and has an Akhira connection, not just a worldly want.' },
    { em:'⚡', title:'Reactive vs. Proactive',
      body:'Most people only call on Allah when things go wrong — that is reactive dua. Dream duas are proactive: you ask Allah while life is good, out of aspiration and vision. Yunus (AS) called out from inside a whale — reactive and beautiful. But Ibrahim (AS) made dua for righteous children and a city of peace when life was fine. We need both. Dream duas are your proactive practice.' },
    { em:'🎬', title:'Visualize First, Then Ask',
      body:'Shaykh Muhammad al-Shareef waited 10 years for children. His dua had become habit — words without feeling. He changed: he started imagining first. His daughter\'s wedding. His sons leading salah. He pictured it in vivid detail — then made dua. It was answered. Before each dua: close your eyes, picture the answered version clearly, then open your hands and ask.',
      hadith:'"And He provides from where he does not expect." — Surah At-Talaq (65:3)' },
    { em:'🌱', title:'Your Dua Changes YOU',
      body:'The dua is not just about what you receive — it\'s about who you become. Every time you make a dream dua, you evolve toward the person who deserves that answer. Don\'t shrink your duas to match where you are now. Make them bigger — and let them pull you upward.',
      hadith:'"Allah answers everyone\'s dua except the one who gets impatient and says: my dua was not answered." — Bukhari 6340 · Muslim 2735' }

  adults: [
    { em:'🔑', title:'What is a Dream Dua?',
      body:'A dream dua is specific, vivid, slightly unrealistic, and connected to your Akhira intentions. It gives you butterflies — it terrifies and amazes you simultaneously. It spans 3–6 years and is concrete enough that you can picture exactly what the answered version looks like. Not "be healthy" but "Ya Allah — 60kg, strong knees, energy to stand in qiyam without fatigue."' },
    { em:'📖', title:'The Story That Started It All',
      body:'Shaykh Muhammad al-Shareef was locked out in Mecca. He tried everything — couldn\'t get in. In complete helplessness he remembered: "Is He not best who responds to the desperate one when he calls upon Him?" (27:62). He made dua with full trust. At age 11, he made dua to become hafiz during the last ten nights. He did. Years later: told it\'s impossible to have children. His wife made dua for a child on a plane that seemed to be crashing. The plane landed safely. She got pregnant. He learned: you make dua even when logic says it\'s impossible.',

    { em:'⚡', title:'Reactive vs. Proactive Dua',
      body:'Most people only call on Allah in crisis — reactive dua. Sweet and sincere, but not enough. Proactive dua is asking Allah while things are good, out of aspiration and vision. A man at Hajj on Mount Arafah on the greatest day said "I have everything" and made no dua. That is one of the biggest traps. There is always your akhira. Your children\'s futures. Jannah. Never stop asking.' },
    { em:'🎬', title:'Visualize First, Then Ask',

    { em:'🌱', title:'Your Dua Changes YOU',

  grandparents: [
    { em:'🤲', title:'Your Duas Carry a Lifetime',
      body:'A dream dua is specific, vivid, and connected to what matters most. At this stage of life, your duas carry something extraordinary: a lifetime of knowing Allah. You have lived enough to witness: He answers. He provides from where you did not expect. He never wastes a sincere tear. Ask boldly — for your health, your family, your legacy, and your Akhira. The door of dua has no closing time.',
      hadith:'"The dua of a parent for their child is never rejected." — Tirmidhi 1905' },
    { em:'📜', title:'The Obligation You Cannot Defer',
      body:'The Prophet ﷺ said: "It is not permissible for any Muslim who has something to bequeath to sleep for two nights without having his will (wasiyyah) written." This course will ask you to make duas for your legacy — and part of that legacy is ensuring your affairs are in order. Your wasiyyah, your inheritance distribution per the faraidh Allah prescribed, your debts settled, your wishes known — these are gifts to those you will leave behind. Do not delay.',

    { em:'🎬', title:'Visualize First, Then Ask',
      body:'Before each dua in this guide: close your eyes. Picture the answered version in full detail. Your grandchild reciting Quran. Your family gathered at your janazah, hearts full of love and forgiveness — no debts, no regrets. The sadaqah jariyah you established still flowing. Hold that image. Then open your hands and ask. Allah responds to the one who comes with full presence.',
      hadith:'"And He provides from where he does not expect." — Surah At-Talaq (65:3)' },
    { em:'🌿', title:'The Lesson of Zakariyya — Ask for Everything',
      body:'Zakariyya (AS) was very old. His hair had turned white. His bones had weakened. His wife had never been able to have children. Every worldly sign said: it is over. And yet, he stood before Allah — privately, quietly, with complete certainty — and asked. He said: "My Lord, never have I been let down in my dua to You." Allah gave him Yahya (AS). A son. A prophet. A miracle. Now here is the lesson for you: if Allah could grant THAT — against every biological and worldly reality — then whatever you are about to write in this guide is utterly easy for Him. Your health. Your grandchildren\'s futures. Your marriage. Your legacy. Your fears about what you\'ll leave behind. All of it is small next to what He gave Zakariyya. So ask. Do not be shy about the size of what you want. Allah loves being asked — by you, at this age, with this lifetime of connection behind you.',
      hadith:'"My Lord, my bones have weakened and my head is filled with grey hair, and never have I been let down in my dua to You, O Lord." — Surah Maryam (19:4)' },
    { em:'🌱', title:'Your Legacy Is Still Being Written',
      body:'You are not at the end — you are at the most powerful chapter. The Prophet ﷺ kept making dua until his last breath. Ibrahim (AS) made dua for his descendants who were not yet born. Zakariyya (AS) asked for a son when he was elderly and his wife was barren. Ask for everything. What you ask today may echo through generations you will never meet in this world.',
      hadith:'"When a person dies, their deeds come to an end except for three: ongoing sadaqah, knowledge that benefits others, or a righteous child who prays for them." — Sahih Muslim 1631' }

      body:'خواب جیسی دعا مخصوص، واضح اور دل کی گہرائیوں سے جڑی ہوتی ہے۔ زندگی کے اس مرحلے پر آپ کی دعاؤں میں کچھ خاص ہے — اللہ کو جاننے کی ایک پوری زندگی۔ آپ نے دیکھا ہے کہ اللہ جواب دیتا ہے، بے گمان جگہوں سے رزق دیتا ہے، اور کبھی کوئی سچا آنسو ضائع نہیں کرتا۔ دلیری سے مانگیں — اپنی صحت کے لیے، اپنے خاندان کے لیے، اپنی وراثت کے لیے، اور اپنی آخرت کے لیے۔ دعا کا دروازہ کبھی بند نہیں ہوتا۔',

    { em:'📜', title:'وہ فریضہ جسے آپ ٹال نہیں سکتے',
      body:'نبی کریم ﷺ نے فرمایا: "کسی بھی مسلمان کے لیے جائز نہیں کہ اس کے پاس کوئی وصیت کرنے کی چیز ہو اور وہ دو راتیں بغیر وصیت لکھے گزارے۔" یہ گائیڈ آپ سے اپنی وراثت کے لیے دعائیں کرنے کو کہے گی — اور اس وراثت کا حصہ یہ ہے کہ آپ کے معاملات درست ہوں۔ آپ کی وصیت، اللہ کی مقرر کردہ فرائض کے مطابق تقسیم میراث، ادا شدہ قرضے — یہ سب ان لوگوں کے لیے تحائف ہیں جو آپ کے بعد رہیں گے۔ دیر نہ کریں۔',

        sample:'Ya Allah, my body is an amanah. Give me discipline to care for it — eat well, rest without guilt, move. Heal what is hurting inside me — the anxiety, the self-doubt, the heavy nights. Grant me emotional intelligence and inner peace. When I make mistakes, remind me You are Al-Ghaffar — if You forgive me, I must forgive myself. Let me be strong in the way that matters most: rooted in faith, at peace with my story.',

        refs:['What do you dream for each child — specifically? Visualize each one.','See yourself old, watching your children. What do you see?','What kind of mother do you want to be remembered as?'],

  'adult-granddad': {
    label:'Grandfather', subtitle:'For Grandfathers', em:'🌿',
    theme:{ p:'#1b4332', pd:'#0a2116', a:'#d4a017', al:'#fdf6e3', bg:'#f0f7f4' },
    welcome:{ title:'Assalamu Alaikum 🌿',
      body:'You are in one of the most honoured stages of life. The Prophet ﷺ said: "Respect the elderly, for respecting them is one of the ways of glorifying Allah." Your duas now carry the weight of a lifetime\'s sincerity. Let us use this time to ask for everything — for your health, your family, your legacy, and a beautiful ending.' },
    fndKey:'grandparents', fndTitle:'Before You Begin: Foundations for This Stage',
    cats:[
      { id:'health', em:'💪', title:'Health & Strength',
        intro:'Your body has served you for decades. Ask Allah to sustain it with dignity, so you can continue to worship, give, and be present for your family.',
        mentors:[
          {n:'Ayyub (AS)', d:'patient through years of severe illness — he complained only to Allah, and Allah restored him completely'},
          {n:'Zakariyya (AS)', d:'white-haired, weak-boned, wife barren — asked anyway with certainty. Allah gave him Yahya (AS). If He answered THAT, He can answer whatever you are about to write.'},
          {n:'Prophet Muhammad ﷺ', d:'maintained his body as an amanah and remained active and giving until his very last days'}
        ],
        ayats:[], hadiths:[],
        refs:['What does your body need that you have been putting off?','What health goal would allow you to worship, travel, and be present for family?','What would it look like to be physically strong well into your 80s?'],
        sample:'Ya Allah, sustain my body with strength and dignity. Keep my knees strong enough to stand in qiyam, my eyes sharp enough to read Your Book, my mind clear enough to give wisdom. Free me from chronic pain that dulls my worship. Grant me health not just to survive but to live fully — present for my grandchildren, giving to my community, worshipping You until my last breath.',
        ph:'Ya Allah, for my health and strength I ask...' },
      { id:'deen', em:'🌙', title:'Deen & Spiritual Legacy',
        intro:'This is the chapter to go deeper. The salah that sustained you — deepen it. The Quran you love — complete it. The knowledge you carry — pass it on.',
        mentors:[
          {n:'Prophet Muhammad ﷺ', d:'whose final sermon, final illness, and final breath were all acts of complete worship'},
          {n:'Ibrahim (AS)', d:'who continued making dua for his children, his city, and his lineage until his very last years'},
          {n:'Zakariyya (AS)', d:'white-haired, weak-boned, wife barren — asked anyway, saying "never have I been let down in my dua to You." Allah gave him Yahya (AS). If He answered THAT, He can answer whatever you are about to write.'}
        ],
        ayats:[{ar:'رَبِّ إِنِّي وَهَنَ الْعَظْمُ مِنِّي وَاشْتَعَلَ الرَّأْسُ شَيْبًا وَلَمْ أَكُن بِدُعَائِكَ رَبِّ شَقِيًّا', tr:'My Lord, my bones have weakened and my head is filled with grey hair, and never have I been let down in my dua to You, O Lord.', ref:'Surah Maryam (19:3-4) — Zakariyya\'s words. He asked in old age — and Allah gave him Yahya (AS). Whatever you are about to ask: He can give you that too.'}],
        hadiths:[{tx:'When a person dies, their deeds come to an end except for three: ongoing sadaqah, knowledge that benefits others, or a righteous child who prays for them.', ref:'Sahih Muslim 1631'}],
        refs:['What part of the Quran do you want to complete or deepen before you meet Allah?','What Islamic knowledge do you want to pass on — through grandchildren, community, writing?','What does your most spiritually alive day look like right now?'],
        sample:'Ya Allah, make my remaining years my most spiritually alive. Let me complete the Quran with understanding. Grant me tahajjud as a consistent companion. Deepen my salah — let it be the highlight of every day, not a task. Make me a source of Islamic wisdom for my children and grandchildren. Let my home be a place of Quran and dhikr. Let me die with La ilaha illAllah on my lips, in a state of purity, facing Your direction.',
        ph:'Ya Allah, for my deen and spiritual legacy I ask...' },
      { id:'spouse', em:'❤️', title:'Marriage & Companionship',
        intro:'After decades together, ask Allah for the marriage that sustains and completes you — in this life and the next.',
        mentors:[
          {n:'Prophet Muhammad ﷺ', d:'who never stopped speaking of Khadija\'s virtues decades after her passing — true love transcends time'},
          {n:'Ibrahim (AS)', d:'devoted to his family across every trial, separation, and year — the model of faithful partnership'},
          {n:'Imran and his wife', d:'who dedicated their household to Allah — and their legacy became Maryam and Isa (AS)'}
        ],
        ayats:[], hadiths:[],
        refs:['What do you love about your spouse that you don\'t say often enough?','How do you want your marriage to feel in its final chapter?','How can you make your spouse feel truly seen and valued today?'],
        sample:'Ya Allah, make our final years together our most peaceful and loving. Heal whatever has accumulated between us — the misunderstandings, the unspoken hurts, the distance. Fill our home with warmth, gentleness, and genuine care. Let us grow old together with gratitude. Let me be a comfort to her in her old age as she has been in mine. Reunite us in Jannatul Firdaus — together, forever.',
        ph:'Ya Allah, for my marriage and companionship I ask...' },
      { id:'family', em:'🌱', title:'Children & Grandchildren',
        intro:'The best thing you can do for your children and grandchildren is make dua for them. Name each one. Picture each one. Ask for each one specifically.',
        mentors:[
          {n:'Ibrahim (AS)', d:'whose dua "My Lord, make me and my descendants people who establish salah" is still being answered today'},
          {n:'Yaqub (AS)', d:'who never lost faith in his children\'s futures — even through decades of grief and separation'},
          {n:'Luqman (AS)', d:'the wise grandfather whose advice to his son is preserved forever in the Quran (31:12-19)'}
        ],
        ayats:[{ar:'رَبِّ اجْعَلْنِي مُقِيمَ الصَّلَاةِ وَمِن ذُرِّيَّتِي', tr:'My Lord, make me an establisher of prayer, and from my descendants. Our Lord, accept my supplication.', ref:'Surah Ibrahim (14:40) — Ibrahim\'s dua for his lineage'}],
        hadiths:[],
        refs:['Name each grandchild — what do you specifically dream for them?','What is the most important thing you want them to remember about you?','What Islamic legacy do you want to plant in their hearts before you go?'],
        sample:'Ya Allah, I present my children and grandchildren to You by name. Make each of them a person of Quran, of prayer, of honest character. Protect them from the fitnah of this age — the screens, the doubt, the distance from You. Let them love the masjid. Let them choose righteous spouses. Grant them children better than themselves. Let my duas for them be a shield over them long after I am gone. Make them my sadaqah jariyah into eternity.',
        ph:'Ya Allah, for my children and grandchildren I ask...' },
      { id:'affairs', em:'📜', title:'Affairs, Will & Inheritance',
        intro:'This is not a morbid category — it is one of the most loving acts you can do for your family. The Prophet ﷺ commanded every Muslim to have their will written. Take this seriously.',
        mentors:[
          {n:'Abu Bakr (RA)', d:'who wrote his will before every expedition — he never left his affairs unresolved'},
          {n:'Prophet Muhammad ﷺ', d:'who left detailed, clear instructions and settled every debt before he passed — a mercy to all he left behind'},
          {n:'Uthman ibn Affan (RA)', d:'who planned his legacy with such generosity that its effects were felt for generations'}
        ],
        ayats:[{ar:'يُوصِيكُمُ اللَّهُ فِي أَوْلَادِكُمْ ۖ لِلذَّكَرِ مِثْلُ حَظِّ الْأُنثَيَيْنِ', tr:'Allah instructs you concerning your children: for the male what is equal to the share of two females. Allah is ever Knowing and Wise.', ref:'Surah An-Nisa (4:11) — the foundation of Islamic inheritance law'}],
        hadiths:[{tx:'It is not permissible for any Muslim who has something to bequeath to sleep for two nights without having his will (wasiyyah) written and kept ready with him.', ref:'Sahih al-Bukhari 2738 · Sahih Muslim 1627'}],
        refs:['Have you written your wasiyyah (Islamic will)? Is it current and accessible?','Is your estate to be distributed according to Islamic faraidh — or do you need to consult a scholar?','Who is your named executor (wasi)? Does he know?','Are there debts owed to you or by you that should be settled or forgiven now?','What sadaqah jariyah (Quran endowment, masjid contribution, scholarship) do you want established?','Have you told your family your wishes for your final care, janazah, and burial?'],
        sample:'Ya Allah, help me put my affairs in order while I still have time and clarity. Guide me to write my wasiyyah with fairness, following Your faraidh. Forgive me for any delays. Help me settle every debt — what I owe to You through missed prayers and fasts, and what I owe to people. Let me forgive freely and be forgiven fully. Grant me the sadaqah jariyah that continues after my death — Quran someone recites, knowledge someone carries, a grandchild who prays for me. Let me leave this world with nothing pending, no heart broken by injustice, and all rights fulfilled.',
        ph:'Ya Allah, regarding my affairs and what I leave behind I ask...' },
      { id:'joy', em:'✨', title:'Joy, Gratitude & Contentment',
        intro:'Joy is Sunnah. Rest is halal. Gratitude is worship. Ask Allah for a life in this final chapter that is full — not just endured.',
        mentors:[
          {n:'Prophet Muhammad ﷺ', d:'who played with his grandchildren Hasan and Husayn, made jokes with his companions, and smiled often'},
          {n:'Ibrahim (AS)', d:'who in old age was visited by angels, hosted guests with joy, and still looked forward with hope'},
          {n:'Luqman (AS)', d:'whose contentment and wisdom made every moment of his life a gift to those around him'}
        ],
        ayats:[{ar:null, tr:'So which of the favors of your Lord would you deny?', ref:'Surah Ar-Rahman (55:13) — a verse for hearts full of gratitude'}],
        hadiths:[],
        refs:['What brings you genuine joy that you\'d like more of?','What is one experience — travel, family gathering, achievement — you still dream of?','How do you want to feel when you reflect on your life — and how can dua help get you there?'],
        sample:'Ya Allah, let me enjoy what You have given me without guilt and without waste. Let me travel with my family, make memories with my grandchildren, sit with old friends in laughter. Give me rest that is sweet, not anxious. Fill my home with warmth. Grant me Umrah once more — let me stand before Your House in gratitude. Let my final years be full of Alhamdulillah — not regret. Let me meet You having truly lived, truly loved, and truly served You.',
        ph:'Ya Allah, for joy and contentment in this stage of life I ask...' }
    ]
  },

// ════════════════════════════════════════════════
// TEXT TO SPEECH
// ════════════════════════════════════════════════

const _tts = {}
let _ttsIdx = 0
let _ttsCurrent = null

function ttsBtn(text, extraClass) {
  const k = 't' + (_ttsIdx++)
  _tts[k] = (text || '').replace(/<[^>]+>/g, ' ').replace(/\s+/g, ' ').trim()
  const cls = extraClass ? 'tts-btn ' + extraClass : 'tts-btn'
  return `<button class="${cls}" onclick="speakTTS('${k}',this)">▶ Listen</button>`
}

function speakTTS(key, btn) {
  if (!window.speechSynthesis) {
    alert('Text-to-speech is not available in this browser. Try Chrome or Safari.')
    return
  }
  const isPlaying = _ttsCurrent === key && window.speechSynthesis.speaking
  window.speechSynthesis.cancel()
  _resetTTSBtns()
  if (isPlaying) { _ttsCurrent = null; return }

  const text = _tts[key]
  if (!text) return

  const ut = new SpeechSynthesisUtterance(text)
  ut.rate  = 0.88
  ut.pitch = 1.0

  // Use saved voice preference, or fall back to best available English voice
  const voices = window.speechSynthesis.getVoices()
  const voice  = (S.ttsVoice && voices.find(v => v.voiceURI === S.ttsVoice)) ||
                 voices.find(v => v.localService && v.lang === 'en-GB')  ||
                 voices.find(v => v.localService && v.lang === 'en-US')  ||
                 voices.find(v => v.localService && v.lang.startsWith('en')) ||
                 voices.find(v => v.lang.startsWith('en'))
  if (voice) ut.voice = voice

  _ttsCurrent = key
  btn.innerHTML = '⏹ Stop'
  btn.classList.add('tts-active')

  ut.onend = ut.onerror = () => { _ttsCurrent = null; _resetTTSBtns() }
  window.speechSynthesis.speak(ut)
}

function _resetTTSBtns() {
  document.querySelectorAll('.tts-btn.tts-active').forEach(b => {
    b.innerHTML = '▶ Listen'
    b.classList.remove('tts-active')
  })
}

function setTTSVoice(uri) {
  S.ttsVoice = uri
  localStorage.setItem('dua-voice-pref', uri)
}

function voicePickerHTML() {
  if (!window.speechSynthesis) return ''
  const voices = window.speechSynthesis.getVoices().filter(v => v.lang.startsWith('en'))
  const opts = voices.length
    ? voices.map(v =>
        `<option value="${v.voiceURI}"${S.ttsVoice === v.voiceURI ? ' selected' : ''}>${v.name} (${v.lang})</option>`
      ).join('')
    : '<option value="">Loading voices…</option>'
  return `<div class="field">
    <label>🔊 Narrator voice <span style="font-weight:400;color:var(--muted)">(optional — for Listen buttons)</span></label>
    <select id="voice-sel" class="voice-sel" onchange="setTTSVoice(this.value)">${opts}</select>
  </div>`
}

// ════════════════════════════════════════════════
// AUDIO — INDEXEDDB + MEDIARECORDER
// ════════════════════════════════════════════════

let audioDB  = null
let mediaStream = null
let mediaRec = null
let recChunks = []
let recTick  = null
let recSecs  = 0
let recCatId = null

function initAudioDB() {
  return new Promise(res => {
    if (!window.indexedDB) { res(); return }
    const req = indexedDB.open('dua-audio-v1', 1)
    req.onupgradeneeded = e => e.target.result.createObjectStore('rec', { keyPath:'id' })
    req.onsuccess = e => { audioDB = e.target.result; res() }
    req.onerror   = () => res()
  })
}

function audioKey(catId) { return `${S.version}::${catId}` }

function saveAudioBlob(catId, blob) {
  if (!audioDB) return
  const tx = audioDB.transaction('rec','readwrite')
  tx.objectStore('rec').put({ id:audioKey(catId), blob, ts:Date.now() })
}

function getAudioBlob(catId) {
  return new Promise(res => {
    if (!audioDB) { res(null); return }
    const tx  = audioDB.transaction('rec','readonly')
    const req = tx.objectStore('rec').get(audioKey(catId))
    req.onsuccess = e => res(e.target.result ? e.target.result.blob : null)
    req.onerror   = () => res(null)
  })
}

function delAudioBlob(catId) {
  if (!audioDB) return
  const tx = audioDB.transaction('rec','readwrite')
  tx.objectStore('rec').delete(audioKey(catId))
}

function fmtSecs(s) {
  return Math.floor(s/60) + ':' + (s%60 < 10 ? '0' : '') + (s%60)
}

function voiceRecordHTML(catId) {
  return `<button class="voice-rec-btn" onclick="startRecording('${catId}')">
    <span class="mic-ic">🎤</span>
    <span>Add a voice note for this category</span>
  </button>`
}

function voicePlayerHTML(catId, url) {
  return `<div class="voice-player-box">
    <span class="vp-label">🎤 Your Voice Note</span>
    <audio controls src="${url}"></audio>
    <div class="vp-actions">
      <button class="vp-btn vp-btn-rec" onclick="startRecording('${catId}')">🔄 Re-record</button>
      <button class="vp-btn vp-btn-del" onclick="deleteVoiceNote('${catId}')">🗑️ Delete</button>
    </div>
  </div>`
}

function voiceRecordingHTML() {
  return `<div class="voice-recording">
    <div class="rec-dot"></div>
    <span class="rec-timer" id="rec-timer">0:00</span>
    <span class="rec-label">Recording… tap Stop when done</span>
    <button class="stop-btn" onclick="stopRecording()">■ Stop</button>
  </div>`
}

async function loadVoiceUI(catId) {
  const el = document.getElementById(`voice-${catId}`)
  if (!el) return
  const blob = await getAudioBlob(catId)
  if (blob) {
    const url = URL.createObjectURL(blob)
    el.innerHTML = voicePlayerHTML(catId, url)
  } else {
    el.innerHTML = voiceRecordHTML(catId)
  }
}

async function startRecording(catId) {
  if (mediaRec && mediaRec.state === 'recording') stopRecording()
  if (!navigator.mediaDevices) {
    alert('Audio recording is not supported in this browser. Try Chrome or Safari on iOS 14.5+.')
    return
  }
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio:true })
    mediaStream = stream
    recCatId    = catId
    recChunks   = []
    recSecs     = 0

    const el = document.getElementById(`voice-${catId}`)
    if (el) el.innerHTML = voiceRecordingHTML()

    recTick = setInterval(() => {
      recSecs++
      const t = document.getElementById('rec-timer')
      if (t) t.textContent = fmtSecs(recSecs)
      if (recSecs >= 300) stopRecording() // 5 min hard limit
    }, 1000)

    const mimeType = MediaRecorder.isTypeSupported('audio/webm;codecs=opus')
      ? 'audio/webm;codecs=opus'
      : MediaRecorder.isTypeSupported('audio/mp4') ? 'audio/mp4' : ''
    mediaRec = new MediaRecorder(stream, mimeType ? { mimeType } : {})
    mediaRec.ondataavailable = e => { if (e.data.size > 0) recChunks.push(e.data) }
    mediaRec.onstop = async () => {
      clearInterval(recTick); recTick = null
      stream.getTracks().forEach(t => t.stop())
      const blob = new Blob(recChunks, { type: mediaRec.mimeType })
      saveAudioBlob(recCatId, blob)
      await loadVoiceUI(recCatId)
    }
    mediaRec.start(250)
  } catch(err) {
    clearInterval(recTick)
    if (err.name === 'NotAllowedError') {
      alert('Microphone access was denied. Please allow mic access in your browser settings and try again.')
    } else {
      alert('Could not start recording: ' + err.message)
    }
  }
}

function stopRecording() {
  if (mediaRec && mediaRec.state !== 'inactive') mediaRec.stop()
  if (recTick) { clearInterval(recTick); recTick = null }
}

async function deleteVoiceNote(catId) {
  if (!confirm('Delete this voice note?')) return
  delAudioBlob(catId)
  const el = document.getElementById(`voice-${catId}`)
  if (el) el.innerHTML = voiceRecordHTML(catId)
}

function criteriaStripHTML() {
  const pills = CRITERIA.map((c, i) =>
    `<span class="cs-pill" onclick="showCriteriaHint(${i})" data-ci="${i}">${c.em} ${c.label}</span>`
  ).join('')
  return `<div class="criteria-strip">
    <div class="cs-row">
      <span class="cs-lbl">Good dua has:</span>
      ${pills}
    </div>
    <div class="cs-hint" id="cs-hint-box"></div>
  </div>`
}

function showCriteriaHint(idx) {
  const box = document.getElementById('cs-hint-box')
  const pill = document.querySelector(`.cs-pill[data-ci="${idx}"]`)
  if (!box || !pill) return
  const isActive = pill.classList.contains('cp-on')
  document.querySelectorAll('.cs-pill').forEach(p => p.classList.remove('cp-on'))
  box.classList.remove('show')
  if (!isActive) {
    pill.classList.add('cp-on')
    box.textContent = CRITERIA[idx].hint
    box.classList.add('show')
  }
}

function helpPanelHTML(catId) {
  const ex = DUA_EXAMPLES[catId] || DUA_EXAMPLES['health']
  const notes = ex.notes.map(n => `<li>${n}</li>`).join('')
  return `<div class="help-panel" id="hp-${catId}" hidden>
    <div class="hp-bad">
      <span class="hp-tag">❌ Too vague</span>
      <p class="hp-text">${ex.bad}</p>
    </div>
    <div class="hp-arrow">↓ made specific &nbsp;·&nbsp; vivid &nbsp;·&nbsp; heartfelt</div>
    <div class="hp-good">
      <span class="hp-tag">✅ Dream Dua</span>
      <p class="hp-text">${ex.good}</p>
    </div>
    <div class="hp-notes">
      <span class="hp-notes-lbl">What changed:</span>
      <ul>${notes}</ul>
    </div>
  </div>`
}

function toggleHelpPanel(catId) {
  const p = document.getElementById('hp-' + catId)
  if (p) p.hidden = !p.hidden
}

// ════════════════════════════════════════════════
// STATE & STORAGE
// ════════════════════════════════════════════════

let S = { version:null, screen:'select', name:'', age:'', answers:{}, ttsVoice: localStorage.getItem('dua-voice-pref')||'' }

const key  = (v) => `dua-v1-${v}`
const save = ()  => { if(S.version) localStorage.setItem(key(S.version), JSON.stringify(S)) }
const load = (v) => { const r=localStorage.getItem(key(v)); return r?JSON.parse(r):null }
const wipe = (v) => { localStorage.removeItem(key(v)) }
const hasSaved = (v) => !!localStorage.getItem(key(v))

// ════════════════════════════════════════════════
// NAVIGATION
// ════════════════════════════════════════════════

const seq = (v) => {
  const cats = VERSIONS[v].cats.map((_,i) => `cat-${i}`)
  return ['foundation',...cats,'summary']
}

function goTo(s) {
  if (window.speechSynthesis) window.speechSynthesis.cancel()
  _ttsCurrent = null
  const main = document.getElementById('main')
  main.classList.add('fade')
  setTimeout(() => {
    S.screen = s; save(); render()
    main.classList.remove('fade')
    main.scrollTo(0,0)
  }, 140)
}

function next() {
  const s = seq(S.version), i = s.indexOf(S.screen)
  if(i < s.length-1) goTo(s[i+1])
}
function back() {
  if(S.screen === 'foundation') { goTo('welcome'); return }
  const s = seq(S.version), i = s.indexOf(S.screen)
  if(i > 0) goTo(s[i-1]); else goTo('foundation')
}

function pickVersion(v) {
  S.version = v; applyTheme(v)
  const saved = load(v)
  if(saved && saved.screen && saved.screen !== 'select') {
    Object.assign(S, saved)
    goTo('welcome')
  } else {
    S.screen = 'welcome'; S.name=''; S.age=''; S.answers={}
    goTo('welcome')
  }
}

function startFresh() {
  wipe(S.version); S.answers={}; S.name=''; S.age=''
  goTo('foundation')
}

function continueJourney() {
  const s = S.screen && S.screen !== 'welcome' && S.screen !== 'select' ? S.screen : 'foundation'
  goTo(s)
}

function beginNew() {
  S.name  = document.getElementById('inp-name')?.value?.trim() || ''
  S.age   = document.getElementById('inp-age')?.value?.trim() || ''
  save(); goTo('foundation')
}

function saveTA(id, val) {
  S.answers[id] = val; save()
}

// ════════════════════════════════════════════════
// THEME
// ════════════════════════════════════════════════

function applyTheme(v) {
  const t = VERSIONS[v].theme, r = document.documentElement.style
  r.setProperty('--p',  t.p)
  r.setProperty('--pd', t.pd)
  r.setProperty('--a',  t.a)
  r.setProperty('--al', t.al)
  r.setProperty('--bg', t.bg)
  document.body.style.background = t.bg
}

// ════════════════════════════════════════════════
// RENDER
// ════════════════════════════════════════════════

function render() {
  const main = document.getElementById('main')
  const hdr  = document.getElementById('hdr')
  const ftr  = document.getElementById('ftr')

  // Apply RTL layout for Urdu versions
  const isUrdu = S.version && S.version.endsWith('-urdu')
  main.classList.toggle('rtl-wrap', isUrdu)
  document.documentElement.lang = isUrdu ? 'ur' : 'en'

  // header + footer visibility
  const inFlow = S.version && !['select','welcome'].includes(S.screen)
  const isSummary = S.screen === 'summary'

  if(inFlow && !isSummary) {
    const s   = seq(S.version), i = s.indexOf(S.screen)
    const pct = Math.round(((i+1)/s.length)*100)
    hdr.className = 'on'
    document.getElementById('hdr-label').textContent = `Step ${i+1} of ${s.length}`
    document.getElementById('hdr-fill').style.width  = pct+'%'
    const isFirst = S.screen==='foundation'
    const isLast  = i === s.length-2
    ftr.className = 'on'
    ftr.innerHTML =
      (!isFirst ? `<button class="btn btn-g" onclick="back()">← Back</button>` : '') +
      `<button class="btn btn-p" onclick="handleNext()">${isLast?'See My Duas →':'Next →'}</button>`
  } else {
    hdr.className = ''
    ftr.className = ''
    ftr.innerHTML = ''
  }

  // route
  if(S.screen==='select')             { main.innerHTML = renderSelect();    return }
  if(S.screen==='welcome')            { main.innerHTML = renderWelcome();   return }
  if(S.screen==='foundation')         { main.innerHTML = renderFoundation(); return }
  if(S.screen.startsWith('cat-')) {
    const idx = parseInt(S.screen.split('-')[1])
    main.innerHTML = renderCat(idx)
    bindTA(idx)
    loadVoiceUI(VERSIONS[S.version].cats[idx].id)
    return
  }
  if(S.screen==='summary')            { main.innerHTML = renderSummary();   return }
}

function handleNext() {
  // save current textarea if on a cat screen
  if(S.screen.startsWith('cat-')) {
    const idx = parseInt(S.screen.split('-')[1])
    const ta  = document.getElementById('dua-ta')
    if(ta) saveTA(VERSIONS[S.version].cats[idx].id, ta.value)
  }
  next()
}

// ─── SELECT SCREEN ───
function renderSelect() {
  const cards = Object.keys(VERSIONS).map(v => {
    const d = VERSIONS[v]
    const saved = hasSaved(v)
    return `<div class="ver-card" onclick="pickVersion('${v}')">
      ${saved ? `<span class="vc-badge">In progress</span>` : ''}
      <span class="vc-em">${d.em}</span>
      <span class="vc-lb">${d.label}</span>
      <span class="vc-sub">${d.subtitle}</span>
    </div>`
  }).join('')

  return `<div class="sel-wrap">
    <div class="sel-top">
      <span class="bismi">بِسْمِ اللهِ الرَّحْمٰنِ الرَّحِيْمِ</span>
      <h1>Dream Duas</h1>
      <p>A guided Visionaire workbook — pick your version to begin</p>
    </div>
    <div class="ver-grid">${cards}</div>
    <div class="sel-credit">
      <strong>Compiled by UmmAbdullah</strong> &nbsp;·&nbsp;
      Adapted from Muhammad al-Shareef's Visionaire Course<br>
      <em>More versions coming soon</em>
    </div>
  </div>`
}

// ─── WELCOME SCREEN ───
function renderWelcome() {
  const v = VERSIONS[S.version], saved = load(S.version)
  const isReturn = saved && saved.answers && Object.keys(saved.answers).length > 0
  const total = v.cats.length
  const done  = isReturn ? Object.keys(saved.answers).filter(k=>saved.answers[k].trim()).length : 0

  let returnBanner = ''
  if(isReturn) {
    returnBanner = `<div class="return-box">
      <p>Welcome back${S.name ? ', '+S.name : ''}! You've filled in <strong>${done} of ${total}</strong> categories. Continue where you left off?</p>
      <div class="rb-row">
        <button class="btn btn-p btn-sm" onclick="continueJourney()">Continue ✓</button>
        <button class="btn btn-g btn-sm" onclick="startFresh()">Start Fresh</button>
      </div>
    </div>`
  }

  return `<div class="wel-wrap">
    <span class="wel-icon">${v.em}</span>
    <h2>${v.welcome.title}</h2>
    <p class="wel-body">${v.welcome.body}</p>
    ${returnBanner}
    <div class="field">
      <label>Your name <span style="font-weight:400;color:var(--muted)">(optional)</span></label>
      <input id="inp-name" type="text" placeholder="What should we call you?" value="${S.name||''}">
    </div>
    <div class="field">
      <label>Your age <span style="font-weight:400;color:var(--muted)">(optional)</span></label>
      <input id="inp-age" type="number" placeholder="e.g. 14" value="${S.age||''}" min="7" max="99">
    </div>
    ${voicePickerHTML()}
    <button class="btn btn-p btn-full" style="margin-top:8px" onclick="beginNew()">Begin My Journey →</button>
    <button class="btn btn-g btn-full" style="margin-top:10px;font-size:13px" onclick="S.version=null;applyTheme('kids');render()">← Choose a different version</button>
  </div>`
}

// ─── FOUNDATION SCREEN ───
function renderFoundation() {
  const v = VERSIONS[S.version]
  const fKey = v.fndKey
  const cards = FOUNDATION[fKey].map(f => {
    const readText = f.body + (f.hadith ? ' ' + f.hadith : '')
    return `<div class="teach-card${fKey==='kids'?' fun':''}">
      <h3>${f.em} ${f.title}</h3>
      <p>${f.body}</p>
      ${f.hadith ? `<p class="hadith">${f.hadith}</p>` : ''}
      ${ttsBtn(readText)}
    </div>`
  }).join('')
  const nameGreet = S.name ? `, ${S.name}` : ''
  return `<div class="fnd-wrap">
    <h2>${S.name ? 'Ready'+nameGreet+'?' : 'Before You Begin'}</h2>
    <p class="fnd-intro">${v.fndTitle}</p>
    ${cards}
    <button class="btn btn-p btn-full" style="margin-top:6px" onclick="next()">
      I'm Ready — Let's Build My Duas 🤲
    </button>
  </div>`
}

// ─── CATEGORY SCREEN ───
function renderCat(idx) {
  const v     = VERSIONS[S.version]
  const cat   = v.cats[idx]
  const total = v.cats.length
  const saved = S.answers[cat.id] || ''
  const refs  = cat.refs.map(r=>`<li>${r}</li>`).join('')

  const mentorReadText = (cat.mentors||[]).map(m => m.n + (m.d ? '. ' + m.d : '')).join('. ')
  const mentorsHtml = (cat.mentors||[]).length
    ? `<div class="mentor-box">
         <h4>✦ Inspired by ${ttsBtn(mentorReadText, 'tts-sm')}</h4>
         <ul>${(cat.mentors).map(m=>`<li><strong>${m.n}</strong>${m.d?' — '+m.d:''}</li>`).join('')}</ul>
       </div>` : ''

  const ayatsHtml = (cat.ayats||[]).map(a=>
    `<div class="cat-ayat">
       ${a.ar?`<span class="cat-ayat-ar">${a.ar}</span>`:''}
       <span class="cat-ayat-tr">"${a.tr}"</span>
       <span class="cat-ref">📖 ${a.ref}</span>
     </div>`).join('')

  const hadithsHtml = (cat.hadiths||[]).map(h=>
    `<div class="cat-hadith">
       <span class="cat-hadith-tx">"${h.tx}"</span>
       <span class="cat-ref">📖 ${h.ref}</span>
     </div>`).join('')

  return `<div class="cat-wrap">
    <div class="cat-hdr">
      <span class="cat-em">${cat.em}</span>
      <div class="cat-hdr-text">
        <h2>${cat.title}</h2>
        <span class="cat-num">Category ${idx+1} of ${total}</span>
      </div>
    </div>
    <p class="cat-intro">${cat.intro}</p>
    ${ttsBtn(cat.intro, 'tts-sm')}
    ${criteriaStripHTML()}
    <div class="voice-section" id="voice-${cat.id}">
      <button class="voice-rec-btn" onclick="startRecording('${cat.id}')">
        <span class="mic-ic">🎤</span>
        <span>Add a voice note for this category</span>
      </button>
    </div>
    ${mentorsHtml}
    ${ayatsHtml}
    ${hadithsHtml}
    <div class="reflect-box">
      <h4>✦ Reflect on this</h4>
      <ul>${refs}</ul>
    </div>
    <button class="sample-toggle" id="sample-btn" onclick="toggleSample()">
      ✦ Need inspiration? See a sample dua
    </button>
    <div class="sample-box" id="sample-box">
      <strong>Sample Dream Dua — for inspiration only</strong>
      <p>${cat.sample}</p>
    </div>
    <div class="ta-label-row">
      <label class="ta-label" for="dua-ta">
        ✍️ ${S.name ? S.name + '\'s' : 'My'} Dream Dua${v.fndKey==='kids'?' (write from your heart! 💛)':''}
      </label>
      <button class="help-btn" onclick="toggleHelpPanel('${cat.id}')">💡 See example</button>
    </div>
    ${helpPanelHTML(cat.id)}
    <textarea id="dua-ta" class="dua-ta" placeholder="${cat.ph}">${saved}</textarea>
    <div class="char-ct" id="char-ct">${saved.length} characters</div>
  </div>`
}

function bindTA(idx) {
  const ta = document.getElementById('dua-ta')
  if(!ta) return
  ta.addEventListener('input', () => {
    autoGrow(ta)
    document.getElementById('char-ct').textContent = ta.value.length + ' characters'
    saveTA(VERSIONS[S.version].cats[idx].id, ta.value)
  })
  autoGrow(ta)
}

function toggleSample() {
  const box = document.getElementById('sample-box')
  const btn = document.getElementById('sample-btn')
  box.classList.toggle('open')
  btn.textContent = box.classList.contains('open')
    ? '✦ Hide sample dua' : '✦ Need inspiration? See a sample dua'
}

function autoGrow(el) {
  el.style.height = 'auto'
  el.style.height = Math.max(160, el.scrollHeight) + 'px'
}

// ─── SUMMARY SCREEN ───
const RESOURCES = {
  'kids':            { wb:'workbook-kids.html',      guide:'guide-kids.html',       wbLabel:'Kids Printable Workbook',        guideLabel:'Full Kids Guide' },
  'teen-girls':      { wb:'workbook-teen-girls.html', guide:'guide-teen-girls.html', wbLabel:'Teen Girls Printable Workbook',   guideLabel:'Full Teen Girls Guide' },
  'teen-boys':       { wb:'workbook-teen-boys.html',  guide:'guide-teen-boys.html',  wbLabel:'Teen Boys Printable Workbook',    guideLabel:'Full Teen Boys Guide' },
  'adult-mom':       { wb:'workbook-personal.html',   guide:'guide-adults.html',     wbLabel:'Adult Printable Workbook',        guideLabel:'Full Adult Guide' },
  'adult-dad':       { wb:'workbook-personal.html',   guide:'guide-adults.html',     wbLabel:'Adult Printable Workbook',        guideLabel:'Full Adult Guide' },
  'adult-granddad':       { wb:'workbook-granddad.html',   guide:'guide-adults.html',     wbLabel:'Grandfather Printable Workbook',  guideLabel:'Full Adult Guide' },
  'adult-grandmom':       { wb:'workbook-grandmom.html',   guide:'guide-adults.html',     wbLabel:'Grandmother Printable Workbook',  guideLabel:'Full Adult Guide' },
  'adult-granddad-urdu':  { wb:'workbook-granddad.html',   guide:'guide-adults.html',     wbLabel:'دادا/نانا ورک بک',               guideLabel:'مکمل گائیڈ' },
  'adult-grandmom-urdu':  { wb:'workbook-grandmom.html',   guide:'guide-adults.html',     wbLabel:'دادی/نانی ورک بک',               guideLabel:'مکمل گائیڈ' }
}

function renderSummary() {
  const v    = VERSIONS[S.version]
  const name = S.name || 'Your'
  const res  = RESOURCES[S.version]
  const cards = v.cats.map(cat => {
    const ans = (S.answers[cat.id]||'').trim()
    return `<div class="sum-card">
      <h3>${cat.em} ${cat.title}</h3>
      ${ans
        ? `<p>${ans.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</p>`
        : `<p class="empty">Not filled in yet — go back to add your dua.</p>`
      }
    </div>`
  }).join('')

  return `<div class="sum-wrap">
    <div class="sum-top">
      <span class="sum-icon">🤲</span>
      <h2>MashaAllah${S.name?', '+S.name:''}!</h2>
      <p>Here are ${name === 'Your' ? 'your' : name+"'s"} Dream Duas</p>
    </div>
    ${cards}
    <div class="lq-box">
      <span class="lq-ar">اللَّهُمَّ إِنَّكَ عَفُوٌّ تُحِبُّ الْعَفْوَ فَاعْفُ عَنِّي</span>
      <p class="lq-tr">Allahumma innaka ʿafuwwun tuḥibbul ʿafwa faʿfu ʿannī</p>
      <p class="lq-en">"O Allah, You are the Pardoner. You love to pardon. So pardon me."</p>
      <span class="lq-ref">📖 Tirmidhi 3513 — taught by the Prophet ﷺ to Aisha (RA) for Laylatul Qadr</span>
    </div>
    <div class="sum-actions">
      <button class="btn btn-p" onclick="window.print()">🖨️ Print My Duas</button>
      <button class="btn btn-outline" onclick="editDuas()">✏️ Edit Duas</button>
      <button class="btn btn-g btn-sm" onclick="confirmRestart()">Start Over</button>
    </div>
    <div class="res-box">
      <h4>📚 Your Resources</h4>
      <p>Want to write by hand or read the full guide?</p>
      <div class="res-links">
        <a class="res-link" href="${res.wb}" target="_blank">📋 ${res.wbLabel}</a>
        <a class="res-link res-link-secondary" href="${res.guide}" target="_blank">📖 ${res.guideLabel}</a>
      </div>
    </div>
    <div class="sum-footer">
      <strong>Compiled by UmmAbdullah</strong><br>
      Adapted from Muhammad al-Shareef's Visionaire Course<br>
      <em>May Allah answer every dua written here. آمين</em>
    </div>
  </div>`
}

function editDuas() {
  goTo('cat-0')
}

function confirmRestart() {
  if(confirm('Clear all your duas and start over for this version?')) {
    startFresh(); goTo('foundation')
  }
}

// INIT
// ════════════════════════════════════════════════

// Reset theme on page load (no version selected yet)
document.documentElement.style.setProperty('--p', '#1a5f4a')
document.documentElement.style.setProperty('--pd', '#0d3d2e')
document.documentElement.style.setProperty('--a', '#c9a227')
document.documentElement.style.setProperty('--al', '#fff8e1')
document.documentElement.style.setProperty('--bg', '#f4faf7')

// Chrome loads voices asynchronously — repopulate selector when ready
if (window.speechSynthesis) {
  window.speechSynthesis.addEventListener('voiceschanged', () => {
    const sel = document.getElementById('voice-sel')
    const voices = window.speechSynthesis.getVoices().filter(v => v.lang.startsWith('en'))
    if (sel && voices.length) {
      sel.innerHTML = voices.map(v =>
        `<option value="${v.voiceURI}"${S.ttsVoice === v.voiceURI ? ' selected' : ''}>${v.name} (${v.lang})</option>`
      ).join('')
      // If no saved preference yet, auto-select and save the first available voice
      if (!S.ttsVoice) { setTTSVoice(voices[0].voiceURI); sel.value = voices[0].voiceURI }
    }
  })
}

initAudioDB().then(() => render())
</script>
